<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title description">
  <title id="title">Memory-Karten auf einem grünen Spieltisch</title>
  <desc id="description">Mehrere verdeckte Karten und zwei gefundene Bildpaare liegen auf einem klassischen grünen Spieltisch.</desc>
  <defs>
    <linearGradient id="felt" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#164d3a"/>
      <stop offset="1" stop-color="#071f18"/>
    </linearGradient>
    <pattern id="back" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="18" height="18" fill="#0f3b2c"/>
      <path d="M0 9h18M9 0v18" stroke="#d2ad66" stroke-opacity=".28" stroke-width="2"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#felt)"/>
  <path d="M0 590C230 520 380 690 650 620s380-40 550-10v150H0Z" fill="#081b15" opacity=".26"/>
  <g filter="url(#shadow)" transform="translate(80 66) rotate(-5 500 300)">
    <g fill="url(#back)" stroke="#d2ad66" stroke-width="5">
      <rect x="30" y="55" width="190" height="240" rx="18"/>
      <rect x="255" y="55" width="190" height="240" rx="18"/>
      <rect x="480" y="55" width="190" height="240" rx="18"/>
      <rect x="705" y="55" width="190" height="240" rx="18"/>
      <rect x="930" y="55" width="190" height="240" rx="18"/>
      <rect x="30" y="335" width="190" height="240" rx="18"/>
      <rect x="930" y="335" width="190" height="240" rx="18"/>
    </g>
    <g stroke="#f0d49a" stroke-width="7">
      <rect x="255" y="335" width="190" height="240" rx="18" fill="#f3f0e8"/>
      <rect x="480" y="335" width="190" height="240" rx="18" fill="#f3f0e8"/>
      <rect x="705" y="335" width="190" height="240" rx="18" fill="#f7e9c8"/>
    </g>
    <g fill="#b48a43">
      <circle cx="350" cy="430" r="50"/>
      <circle cx="575" cy="430" r="50"/>
      <path d="M800 405l18 38 42 6-30 29 7 42-37-20-38 20 8-42-31-29 42-6Z"/>
    </g>
    <g fill="#0f3b2c" font-family="Georgia,serif" font-size="31" text-anchor="middle">
      <text x="350" y="525">PAAR</text>
      <text x="575" y="525">PAAR</text>
      <text x="800" y="525">MERKEN</text>
    </g>
  </g>
</svg>
